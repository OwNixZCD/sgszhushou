<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>曹金玉 · 隅泣 · 灵动版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0e9f5 0%, #e0d3eb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .card {
            max-width: 950px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            box-shadow: 0 20px 40px -12px rgba(78, 45, 98, 0.3), 
                        0 4px 10px rgba(0, 0, 0, 0.05);
            padding: 1.8rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #4a2f5c, #8b6f9c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        h1::before {
            content: "✨";
            font-size: 2rem;
            background: none;
            -webkit-text-fill-color: initial;
            color: #b495c4;
        }

        hr {
            border: none;
            height: 3px;
            background: linear-gradient(90deg, #c5b1d9, #ecd8ff, #c5b1d9);
            border-radius: 6px;
            margin: 0.8rem 0 1.5rem 0;
            opacity: 0.5;
        }

        h3 {
            font-size: 1.3rem;
            font-weight: 500;
            color: #3e2c4a;
            margin: 1.2rem 0 0.8rem 0;
            letter-spacing: 0.2px;
            border-left: 6px solid #b698d0;
            padding-left: 0.8rem;
        }

        /* 数值卡片网格 — 4列，移动端转为2列 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            list-style: none;
            padding-left: 0;
            margin: 1.2rem 0 0.8rem;
        }

        .stat-item {
            background: white;
            border-radius: 28px;
            padding: 1rem 0.3rem;
            text-align: center;
            box-shadow: 0 8px 18px -10px rgba(105, 70, 130, 0.25);
            border: 1px solid rgba(230, 215, 245, 0.6);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            backdrop-filter: blur(4px);
        }

        .stat-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 24px -12px #aa8ec7;
        }

        .stat-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #5b4870;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
            display: inline-block;
            background: linear-gradient(145deg, #352a3f, #624d77);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-cap {
            font-size: 0.9rem;
            color: #b19ac5;
            margin-left: 3px;
            font-weight: 400;
        }

        /* 技能描述条 — 优化为两行清晰语义 */
        .skill-description {
            background: #f0e7fa;
            border-radius: 40px;
            padding: 1rem 1.2rem;
            margin: 1.5rem 0 1.5rem;
            text-align: center;
            border: 1px solid #dcc7f0;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.8), 0 6px 10px -6px #b194cc;
        }

        .skill-description p {
            font-size: 1.1rem;
            color: #2f2339;
            font-weight: 500;
            line-height: 1.5;
            margin: 0.2rem 0;
        }

        .skill-description span {
            display: inline-block;
            background: #7d619b;
            color: white;
            font-weight: 600;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            margin: 0 3px;
            min-width: 2.2rem;
            box-shadow: 0 3px 0 #4d3a60;
            font-size: 0.95rem;
            white-space: nowrap; /* 防止数字和背景分开 */
        }

        /* 按钮组通用 */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 1rem 0 0.6rem;
        }

        .btn {
            border: none;
            background: white;
            padding: 14px 16px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 550;
            color: #3c2b48;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(150, 120, 180, 0.2);
            transition: all 0.1s ease;
            border: 1px solid rgba(200, 175, 225, 0.5);
            flex: 1 1 auto;
            min-width: 120px;
            backdrop-filter: blur(2px);
            letter-spacing: 0.3px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            background: #f4ecfe;
            box-shadow: 0 10px 16px -6px #a987c2;
            border-color: #b484e0;
        }

        .btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 8px #ab8ec9;
        }

        .btn.selected {
            background: #a27cb9;
            color: white;
            border-color: #6d4f8b;
            box-shadow: 0 6px 14px #8e6cae, 0 0 0 2px rgba(230, 210, 255, 0.8);
        }

        .btn-trigger {
            background: #e3d1f5;
            border-color: #b693da;
            font-weight: 600;
            color: #311f40;
        }

        .btn-trigger:hover {
            background: #d2b9f0;
        }

        .btn-reset {
            background: #d9c6e6;
            color: #352442;
            border-color: #b19acd;
        }

        .btn-reset:hover {
            background: #c7afdf;
        }

        .selected-hint {
            background: #efe6ff;
            border-radius: 40px;
            padding: 0.7rem 1.2rem;
            display: inline-block;
            margin: 0.3rem 0 0;
            border: 1px dashed #b27ed6;
            font-size: 1rem;
            font-weight: 500;
            color: #342545;
            width: auto;
        }

        .selected-hint strong {
            color: #642c9e;
            background: #f0e2ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            margin-left: 8px;
            font-weight: 600;
            white-space: nowrap;
        }

        footer {
            text-align: right;
            font-size: 0.8rem;
            color: #b19ec9;
            margin-top: 1.8rem;
            border-top: 1px dashed #ddcef0;
            padding-top: 0.8rem;
        }

        /* 移动端深度优化 */
        @media (max-width: 700px) {
            body {
                padding: 8px;
            }
            .card {
                padding: 1.3rem 1rem;
                border-radius: 32px;
            }
            h1 {
                font-size: 1.9rem;
                gap: 5px;
            }
            h1::before {
                font-size: 1.8rem;
            }
            h3 {
                font-size: 1.2rem;
                margin: 1rem 0 0.6rem;
                border-left-width: 5px;
                padding-left: 0.6rem;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
            }
            .stat-item {
                padding: 0.9rem 0.2rem;
                border-radius: 24px;
            }
            .stat-label {
                font-size: 0.7rem;
                margin-bottom: 4px;
            }
            .stat-value {
                font-size: 2rem;
            }
            .stat-cap {
                font-size: 0.8rem;
            }
            .skill-description {
                padding: 0.8rem 0.8rem;
                border-radius: 30px;
                margin: 1.2rem 0;
            }
            .skill-description p {
                font-size: 0.95rem;
                line-height: 1.4;
            }
            .skill-description span {
                padding: 0.15rem 0.6rem;
                min-width: 2rem;
                font-size: 0.85rem;
                margin: 2px 2px;
            }
            .button-group {
                gap: 8px;
            }
            .btn {
                padding: 12px 12px;
                font-size: 0.9rem;
                min-width: 100px;
                flex-basis: calc(50% - 8px);
            }
            .btn-reset {
                flex-basis: 100%;
            }
            .selected-hint {
                font-size: 0.9rem;
                padding: 0.6rem 1rem;
                width: 100%;
                text-align: center;
            }
            .selected-hint strong {
                padding: 0.2rem 0.8rem;
                margin-left: 5px;
                white-space: normal;
            }
            footer {
                font-size: 0.7rem;
                margin-top: 1.5rem;
            }
        }

        @media (max-width: 380px) {
            .stat-value {
                font-size: 1.8rem;
            }
            .stat-label {
                font-size: 0.65rem;
            }
            .btn {
                font-size: 0.85rem;
                padding: 10px 8px;
            }
            .skill-description p {
                font-size: 0.9rem;
            }
            h1 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>曹金玉 · 隅泣</h1>
        <hr>

        <!-- 数值展示区 -->
        <ul class="stats-grid no-dot">
            <li class="stat-item">
                <span class="stat-label">👀 观看牌堆顶</span>
                <span class="stat-value" id="cardView">3</span><span class="stat-cap">/5</span>
            </li>
            <li class="stat-item">
                <span class="stat-label">🎁 给受伤角色</span>
                <span class="stat-value" id="giveCard">1</span><span class="stat-cap">/5</span>
            </li>
            <li class="stat-item">
                <span class="stat-label">🃏 自身获得</span>
                <span class="stat-value" id="getCard">1</span><span class="stat-cap">/5</span>
            </li>
            <li class="stat-item">
                <span class="stat-label">📏 距离</span>
                <span class="stat-value" id="distance">0</span><span class="stat-cap">/5</span>
            </li>
        </ul>

        <!-- 动态技能描述 — 优化为两行清晰语义 -->
        <div class="skill-description">
            <p>当受伤角色与你距离 <span id="descDistance">0</span>，你可以观看牌堆顶 <span id="descView">3</span> 张牌；</p>
            <p>给受伤角色至多 <span id="descGive">1</span> 张牌，自身获得至多 <span id="descGet">1</span> 张牌。</p>
        </div>

        <!-- 选择要提升的数值类型 -->
        <h3>⚙️ ① 选择要强化的属性</h3>
        <div class="button-group">
            <button class="btn" id="btn_cardView" onclick="selectValueType('cardView')">👀 观牌数</button>
            <button class="btn" id="btn_giveCard" onclick="selectValueType('giveCard')">🎁 给牌数</button>
            <button class="btn" id="btn_getCard" onclick="selectValueType('getCard')">🃏 获得牌数</button>
            <button class="btn" id="btn_distance" onclick="selectValueType('distance')">📏 距离</button>
        </div>

        <!-- 当前选中状态 -->
        <div class="selected-hint">
            🎯 当前选中：<strong id="selectedTypeText">观看牌堆顶牌数</strong>
        </div>

        <!-- 技能触发区 -->
        <h3>🌸 ② 触发技能 · 提升数值</h3>
        <div class="button-group">
            <button class="btn btn-trigger" onclick="updateYuqi('xianjing_hurt')">❤️ 娴静(+1)</button>
            <button class="btn btn-trigger" onclick="updateYuqi('shanshen')">🧘 善身 (+2)</button>
            <button class="btn btn-reset" onclick="resetYuqi()">🔄 重置所有</button>
        </div>

        <footer>—— 灵动控场 · 隅泣 ——</footer>
    </div>

    <script>
        (function() {
            const yuqiValues = {
                cardView: 3,
                giveCard: 1,
                getCard: 1,
                distance: 0
            };
            const MAX_VALUE = 5;    
            let selectedType = 'cardView';

            const cardViewSpan = document.getElementById('cardView');
            const giveCardSpan = document.getElementById('giveCard');
            const getCardSpan = document.getElementById('getCard');
            const distanceSpan = document.getElementById('distance');

            const descViewSpan = document.getElementById('descView');
            const descGiveSpan = document.getElementById('descGive');
            const descGetSpan = document.getElementById('descGet');
            const descDistanceSpan = document.getElementById('descDistance');

            const selectedTypeText = document.getElementById('selectedTypeText');

            const btnCardView = document.getElementById('btn_cardView');
            const btnGive = document.getElementById('btn_giveCard');
            const btnGet = document.getElementById('btn_getCard');
            const btnDistance = document.getElementById('btn_distance');
            const allTypeBtns = [btnCardView, btnGive, btnGet, btnDistance];

            function renderValues() {
                cardViewSpan.textContent = yuqiValues.cardView;
                giveCardSpan.textContent = yuqiValues.giveCard;
                getCardSpan.textContent = yuqiValues.getCard;
                distanceSpan.textContent = yuqiValues.distance;

                descViewSpan.textContent = yuqiValues.cardView;
                descGiveSpan.textContent = yuqiValues.giveCard;
                descGetSpan.textContent = yuqiValues.getCard;
                descDistanceSpan.textContent = yuqiValues.distance;
            }

            function clearSelectedStyle() {
                allTypeBtns.forEach(btn => {
                    if (btn) btn.classList.remove('selected');
                });
            }

            window.selectValueType = function(type) {
                selectedType = type;

                const typeNameMap = {
                    'cardView': '观看牌堆顶牌数',
                    'giveCard': '给受伤角色牌数',
                    'getCard': '自身获得牌数',
                    'distance': '距离'
                };
                selectedTypeText.textContent = typeNameMap[type] || '';

                clearSelectedStyle();
                switch (type) {
                    case 'cardView': btnCardView.classList.add('selected'); break;
                    case 'giveCard': btnGive.classList.add('selected'); break;
                    case 'getCard': btnGet.classList.add('selected'); break;
                    case 'distance': btnDistance.classList.add('selected'); break;
                }
            };

            window.updateYuqi = function(skillType) {
                let addNum = 0;
                if (skillType === 'xianjing_hurt') addNum = 1;
                if (skillType === 'shanshen') addNum = 2;

                yuqiValues[selectedType] = Math.min(yuqiValues[selectedType] + addNum, MAX_VALUE);
                renderValues();
            };

            window.resetYuqi = function() {
                yuqiValues.cardView = 3;
                yuqiValues.giveCard = 1;
                yuqiValues.getCard = 1;
                yuqiValues.distance = 0;

                window.selectValueType('cardView');
                renderValues();
            };

            window.addEventListener('DOMContentLoaded', function() {
                window.selectValueType('cardView');
                renderValues();
            });
        })();
    </script>
</body>
</html>
