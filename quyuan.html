<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>屈原 · 离骚填空 · 一将成名（移动适配）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #2b1b0e 0%, #3d2c1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: '华文楷体', 'KaiTi', '宋体', 'SimSun', serif;
            padding: 12px;
            margin: 0;
        }

        .scroll-card {
            max-width: 950px;
            width: 100%;
            background: #f3e9d2;
            background-image: radial-gradient(circle at 25% 30%, rgba(200, 170, 120, 0.2) 0%, transparent 30%),
                              linear-gradient(165deg, #ecd9b4 0%, #dac29c 100%);
            border: 18px solid transparent;
            border-image: repeating-linear-gradient(45deg, #b08e5a, #dabc8c, #b08e5a) 30 stretch;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 30px rgba(255, 215, 140, 0.6);
            padding: 24px 20px 30px 20px;
            border-radius: 32px 32px 28px 28px;
            position: relative;
            transition: all 0.3s;
        }

        .scroll-card::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.08"/></svg>');
            opacity: 0.15;
            pointer-events: none;
            border-radius: 20px;
        }

        .title-section {
            text-align: center;
            margin-bottom: 16px;
            border-bottom: 3px solid #a2835a;
            padding-bottom: 10px;
            position: relative;
        }

        .title-section h1 {
            font-size: 2.6rem;
            font-weight: bold;
            color: #3a2a14;
            text-shadow: 2px 2px 0 #be9e78, 4px 4px 0 rgba(0,0,0,0.2);
            letter-spacing: 8px;
            margin-bottom: 4px;
        }

        .title-section .sub {
            font-size: 1.1rem;
            color: #5d462a;
            background: rgba(210, 180, 130, 0.4);
            display: inline-block;
            padding: 4px 18px;
            border-radius: 30px;
            font-style: italic;
            box-shadow: inset 0 -1px 4px #aa8b5a;
        }

        .skill-desc {
            background: #4d3e2b;
            color: #faeacb;
            padding: 12px 18px;
            border-radius: 40px 8px 40px 8px;
            margin: 20px 0 24px 0;
            font-size: 1rem;
            border: 2px solid #c4a177;
            box-shadow: 0 4px 0 #2b1f12;
            line-height: 1.7;
            text-align: center;
            word-break: break-word;
        }

        .skill-desc strong {
            color: #ffd98c;
            font-weight: bold;
            margin: 0 4px;
        }

        /* 绿色模块：显示带下划线的半句 */
        .verse-box {
            background: #1f2e1b;
            padding: 20px 15px;
            border-radius: 50px 8px 50px 8px;
            border-left: 8px solid #a7773d;
            border-right: 8px solid #a7773d;
            margin: 20px 0 30px 0;
            box-shadow: 0 8px 0 #0f1a0e, inset 0 -2px 10px #5f7a4e;
            color: #efdfb7;
            text-align: center;
        }

        .verse-line {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.4;
            word-break: break-word;
            /* 增强换行控制，避免溢出 */
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: baseline;
            gap: 6px 2px;
        }

        /* 连续下划线样式 - 下移到底部，并自适应宽度 */
        .verse-line .underline {
            display: inline-block;
            min-width: 100px;
            max-width: 220px;
            width: auto;
            flex: 1 1 120px;          /* 允许伸缩，最小120px，优先占用空间 */
            border-bottom: 4px solid #ffd966;
            margin: 0 4px;
            vertical-align: bottom;
            position: relative;
            top: 4px;                  /* 向下微调，使线位于文字下方 */
            height: 0;
        }

        .duel-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 40px 0 25px;
        }

        .scholar-card {
            flex: 1 1 300px;
            background: #b48b65;
            background: linear-gradient(145deg, #c9a77b, #b18554);
            border: 5px solid #f7d9a0;
            border-radius: 60px 20px 60px 20px;
            padding: 24px 16px 18px 16px;
            box-shadow: 8px 8px 0 #4d3822, inset 2px 2px 15px #ffeecc;
            position: relative;
            text-align: center;
            transition: transform 0.2s;
        }

        .scholar-card.left {
            transform: rotate(-0.5deg);
        }
        .scholar-card.right {
            transform: rotate(0.8deg);
        }

        .scholar-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2f1c0c;
            background: #ecd59c;
            display: inline-block;
            padding: 6px 25px;
            border-radius: 40px 10px 40px 10px;
            border: 2px solid #ab6d3a;
            margin-top: -48px;
            margin-bottom: 10px;
            box-shadow: 0 4px 0 #714f2a;
            font-family: '华文楷体', 'KaiTi', serif;
        }

        .task-label {
            background: #4d3a24;
            color: #ffdd99;
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-block;
            font-size: 1.2rem;
            margin-bottom: 16px;
            border: 2px solid #cba052;
            box-shadow: inset 0 -2px 0 #6b4f28;
            letter-spacing: 1px;
        }

        .answer-status {
            background: #3e3022;
            color: #efdba8;
            padding: 8px 10px;
            border-radius: 30px;
            margin: 15px 0 20px;
            font-size: 1.2rem;
            border: 2px solid #b79762;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            word-break: break-word;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0 5px;
            flex-wrap: wrap;
        }

        .choice-btn {
            background: #4f3a24;
            border: 3px solid #ebc280;
            color: #ffeba0;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 12px;
            border-radius: 30px 8px 30px 8px;
            cursor: pointer;
            box-shadow: 0 5px 0 #2e1f12, 0 8px 10px black;
            transition: 0.06s linear;
            font-family: inherit;
            min-width: 140px;
            letter-spacing: 1px;
            word-break: break-word;
            line-height: 1.3;
            flex: 0 1 auto;
        }

        .choice-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #2e1f12, 0 5px 8px black;
        }

        .choice-btn.disabled, .choice-btn:disabled {
            opacity: 0.5;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #2e1f12;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .result-area {
            background: #32281b;
            border-radius: 50px 8px 50px 8px;
            padding: 20px;
            margin: 20px 0 28px;
            border: 3px solid #ad8b58;
            color: #fbeac3;
            font-size: 1.4rem;
            box-shadow: inset 0 0 15px #221a10, 0 6px 0 #0f0b07;
            text-align: center;
            min-height: 120px;
        }

        .result-area .highlight {
            color: #ffbc6c;
            font-weight: bold;
            background: #523f26;
            padding: 4px 15px;
            border-radius: 30px;
            margin: 0 5px;
        }

        .hand-icon {
            font-size: 2rem;
            display: inline-block;
            filter: drop-shadow(2px 4px 4px #221d12);
            margin: 0 5px;
        }

        .reset-btn {
            background: #a9814b;
            border: none;
            border-bottom: 6px solid #4f3a20;
            font-size: 2rem;
            padding: 15px 30px;
            border-radius: 60px 12px 60px 12px;
            color: #1e160c;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 4px;
            width: fit-content;
            margin: 10px auto 0;
            transition: 0.08s;
            box-shadow: 0 10px 16px black;
        }

        .reset-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        .footer-note {
            margin-top: 25px;
            text-align: center;
            font-size: 1rem;
            color: #634f32;
            border-top: 2px dashed #b19362;
            padding-top: 10px;
        }

        /* ---------- 移动端深度适配 ---------- */
        @media (max-width: 700px) {
            .choice-btn {
                font-size: 1rem;
                min-width: 130px;
            }
            .verse-line {
                font-size: 1.5rem;
            }
            .verse-line .underline {
                min-width: 140px;
                max-width: 180px;
                top: 3px;
            }
            .title-section h1 {
                font-size: 2.2rem;
                letter-spacing: 5px;
            }
        }

        /* 中等手机 (500px 以下) */
        @media (max-width: 550px) {
            .scroll-card {
                padding: 18px 12px 25px;
                border-width: 12px;
            }
            .title-section h1 {
                font-size: 2rem;
                letter-spacing: 4px;
            }
            .title-section .sub {
                font-size: 1rem;
                padding: 3px 12px;
            }
            .verse-line {
                font-size: 1.3rem;
            }
            .verse-line .underline {
                min-width: 110px;
                max-width: 150px;
                border-bottom-width: 3px;
                top: 3px;
            }
            .choice-btn {
                font-size: 0.95rem;
                min-width: 115px;
                padding: 8px 10px;
            }
            .scholar-title {
                font-size: 1.6rem;
                padding: 5px 18px;
                margin-top: -44px;
            }
            .task-label {
                font-size: 1.1rem;
                padding: 5px 10px;
            }
            .answer-status {
                font-size: 1.1rem;
                min-height: 45px;
            }
            .result-area {
                font-size: 1.2rem;
                padding: 16px;
            }
            .reset-btn {
                font-size: 1.7rem;
                padding: 12px 24px;
                border-bottom-width: 5px;
            }
        }

        /* 小手机 (400px 以下) */
        @media (max-width: 420px) {
            .scroll-card {
                padding: 12px 8px 20px;
                border-width: 10px;
            }
            .title-section h1 {
                font-size: 1.6rem;
                letter-spacing: 3px;
            }
            .title-section .sub {
                font-size: 0.9rem;
                padding: 2px 10px;
            }
            .skill-desc {
                padding: 10px 12px;
                font-size: 0.9rem;
                margin: 15px 0 18px;
            }
            .verse-box {
                padding: 15px 8px;
                margin: 15px 0 20px;
            }
            .verse-line {
                font-size: 1.1rem;
                gap: 2px;
            }
            .verse-line .underline {
                min-width: 80px;
                max-width: 120px;
                border-bottom-width: 3px;
                margin: 0 2px;
                top: 2px;
            }
            .duel-area {
                gap: 12px;
                margin: 20px 0 15px;
            }
            .scholar-card {
                padding: 18px 8px 12px;
            }
            .scholar-title {
                font-size: 1.3rem;
                padding: 4px 12px;
                margin-top: -38px;
            }
            .task-label {
                font-size: 0.95rem;
                padding: 4px 8px;
                margin-bottom: 10px;
            }
            .answer-status {
                font-size: 0.95rem;
                min-height: 40px;
                padding: 5px 6px;
                margin: 10px 0 12px;
            }
            .btn-group {
                gap: 6px;
            }
            .choice-btn {
                font-size: 0.85rem;
                min-width: 90px;
                padding: 6px 6px;
                border-width: 2px;
                box-shadow: 0 4px 0 #2e1f12, 0 5px 8px black;
            }
            .result-area {
                font-size: 1rem;
                padding: 12px;
                min-height: 90px;
            }
            .reset-btn {
                font-size: 1.3rem;
                padding: 10px 18px;
                border-bottom-width: 4px;
                letter-spacing: 2px;
            }
            .footer-note {
                font-size: 0.8rem;
                margin-top: 15px;
            }
        }

        /* 超小屏 (360px 以下) 进一步微调 */
        @media (max-width: 360px) {
            .verse-line {
                font-size: 1rem;
            }
            .verse-line .underline {
                min-width: 60px;
                max-width: 90px;
            }
            .choice-btn {
                min-width: 75px;
                font-size: 0.8rem;
                padding: 5px 4px;
            }
            .scholar-title {
                font-size: 1.1rem;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="scroll-card">
        <div class="title-section">
            <h1>屈 原</h1>
            <div class="sub">· 限时地主 · 离骚填空 ·</div>
        </div>

        <div class="skill-desc">
            <strong>离骚 :</strong> 令两名角色同时作答：根据给出的半句，选出正确的另一半。先答对者展示所有手牌 ，答错者本回合无法响应牌且伤害翻倍。
        </div>

        <!-- 绿色模块：显示带下划线的半句（连续黄色下划线，位于文字下方） -->
        <div class="verse-box">
            <div class="verse-line" id="verseLineDisplay">
                名余曰正则兮，<span class="underline"></span>
            </div>
        </div>

        <!-- 左右角色区域 -->
        <div class="duel-area">
            <!-- 左徒 -->
            <div class="scholar-card left" id="scholar-left">
                <div class="scholar-title">左 徒</div>
                <div class="task-label">🔍 请补全</div>
                <div class="answer-status" id="left-status">⚡ 等待回答 ⚡</div>
                <div class="btn-group" id="left-btns">
                    <!-- 动态填充两个选项 -->
                </div>
            </div>

            <!-- 三闾大夫 -->
            <div class="scholar-card right" id="scholar-right">
                <div class="scholar-title">三闾大夫</div>
                <div class="task-label">🔍 请补全</div>
                <div class="answer-status" id="right-status">⚡ 等待回答 ⚡</div>
                <div class="btn-group" id="right-btns">
                    <!-- 动态填充两个选项 -->
                </div>
            </div>
        </div>

        <!-- 技能结算显示区域 -->
        <div class="result-area" id="resultDisplay">
            ✦ 静待两位大夫落笔 ✦
        </div>

        <!-- 重置按钮 -->
        <div style="display: flex; justify-content: center;">
            <button class="reset-btn" id="resetBtn">重 开 楚 辞</button>
        </div>
        <div class="footer-note">
            《离骚》名句随机 · 双人同时对句 · 同时结算
        </div>
    </div>

    <script>
        (function() {
            // ---------- 《离骚》句子库 ----------
            const verses = [
                { upper: '长太息以掩涕兮', lower: '哀民生之多艰' },
                { upper: '亦余心之所善兮', lower: '虽九死其犹未悔' },
                { upper: '路漫漫其修远兮', lower: '吾将上下而求索' },
                { upper: '惟草木之零落兮', lower: '恐美人之迟暮' },
                { upper: '朝饮木兰之坠露兮', lower: '夕餐秋菊之落英' },
                { upper: '吾令帝阍开关兮', lower: '倚阊阖而望予' },
                { upper: '名余曰正则兮', lower: '字余曰灵均' }
            ];

            // 辅助：随机取一个下标（不包括excludeIndex）
            function randomIndex(excludeIndex, max) {
                let idx;
                do {
                    idx = Math.floor(Math.random() * max);
                } while (idx === excludeIndex);
                return idx;
            }

            // 当前选中的诗句对索引
            let currentPairIndex = 0;
            // 当前出题模式: true=给上句，要求下句；false=给下句，要求上句
            let isUpperGiven = true;

            // 状态
            const state = {
                left: { answered: false, answer: null, isCorrect: false, timestamp: null },
                right: { answered: false, answer: null, isCorrect: false, timestamp: null }
            };

            // DOM元素
            const verseLineDisplay = document.getElementById('verseLineDisplay');
            const leftStatus = document.getElementById('left-status');
            const rightStatus = document.getElementById('right-status');
            const leftBtnsDiv = document.getElementById('left-btns');
            const rightBtnsDiv = document.getElementById('right-btns');
            const resultDiv = document.getElementById('resultDisplay');
            const resetBtn = document.getElementById('resetBtn');

            // 更新界面：根据随机模式设置题目和选项
            function loadNewPair() {
                // 随机选择一对诗句
                currentPairIndex = Math.floor(Math.random() * verses.length);
                const pair = verses[currentPairIndex];
                const upper = pair.upper;
                const lower = pair.lower;

                // 随机决定给上句还是下句 (true: 给上句，求下句; false: 给下句，求上句)
                isUpperGiven = Math.random() < 0.5;

                // 构建带下划线的显示字符串 (使用flex布局，下划线自动伸缩)
                let displayHtml = '';
                if (isUpperGiven) {
                    displayHtml = `${upper}<span class="underline"></span>`;
                } else {
                    displayHtml = `<span class="underline"></span>${lower}`;
                }
                verseLineDisplay.innerHTML = displayHtml;

                // 正确答案: 如果给上句，正确是lower；如果给下句，正确是upper
                const correctAnswer = isUpperGiven ? lower : upper;

                // 错误选项：从其他诗句对中随机取一个与正确答案类型相同的句子
                let wrongAnswer;
                if (isUpperGiven) {
                    // 需要取其他诗句的lower
                    do {
                        const otherIdx = randomIndex(currentPairIndex, verses.length);
                        wrongAnswer = verses[otherIdx].lower;
                    } while (wrongAnswer === correctAnswer);
                } else {
                    // 需要取其他诗句的upper
                    do {
                        const otherIdx = randomIndex(currentPairIndex, verses.length);
                        wrongAnswer = verses[otherIdx].upper;
                    } while (wrongAnswer === correctAnswer);
                }

                // 两位大夫的选项相同：正确和错误各一，但各自随机打乱顺序
                const leftOpts = [
                    { text: correctAnswer, value: 'correct' },
                    { text: wrongAnswer, value: 'wrong' }
                ];
                shuffleArray(leftOpts);

                const rightOpts = [
                    { text: correctAnswer, value: 'correct' },
                    { text: wrongAnswer, value: 'wrong' }
                ];
                shuffleArray(rightOpts);

                // 清空按钮区域
                leftBtnsDiv.innerHTML = '';
                rightBtnsDiv.innerHTML = '';

                // 确保按钮容器可见（flex）
                leftBtnsDiv.style.display = 'flex';
                rightBtnsDiv.style.display = 'flex';

                // 创建左徒按钮
                leftOpts.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = `choice-btn ${opt.value === 'correct' ? 'correct-btn' : 'wrong-btn'}`;
                    btn.innerText = opt.text;
                    btn.dataset.role = 'left';
                    btn.dataset.answer = opt.value;
                    leftBtnsDiv.appendChild(btn);
                });

                // 创建右徒按钮
                rightOpts.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = `choice-btn ${opt.value === 'correct' ? 'correct-btn' : 'wrong-btn'}`;
                    btn.innerText = opt.text;
                    btn.dataset.role = 'right';
                    btn.dataset.answer = opt.value;
                    rightBtnsDiv.appendChild(btn);
                });

                // 重新绑定事件
                bindButtons();

                // 重置状态
                resetStateOnly();
            }

            // 打乱数组
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }

            // 绑定所有按钮的事件
            function bindButtons() {
                const leftBtns = leftBtnsDiv.querySelectorAll('.choice-btn');
                leftBtns.forEach(btn => {
                    btn.addEventListener('click', leftClickHandler);
                });
                const rightBtns = rightBtnsDiv.querySelectorAll('.choice-btn');
                rightBtns.forEach(btn => {
                    btn.addEventListener('click', rightClickHandler);
                });
            }

            // 左徒点击处理
            function leftClickHandler(e) {
                const btn = e.currentTarget;
                if (state.left.answered) return;
                const isCorrect = (btn.dataset.answer === 'correct');
                recordAnswer('left', isCorrect);
                // 隐藏左徒按钮组
                leftBtnsDiv.style.display = 'none';
                leftStatus.innerHTML = '✓ 已答';
            }

            // 右徒点击处理
            function rightClickHandler(e) {
                const btn = e.currentTarget;
                if (state.right.answered) return;
                const isCorrect = (btn.dataset.answer === 'correct');
                recordAnswer('right', isCorrect);
                // 隐藏右徒按钮组
                rightBtnsDiv.style.display = 'none';
                rightStatus.innerHTML = '✓ 已答';
            }

            // 记录答案，并检查是否两人都已答
            function recordAnswer(role, isCorrect) {
                state[role].answered = true;
                state[role].isCorrect = isCorrect;
                state[role].timestamp = Date.now();

                // 如果两人都已答，进行结算
                if (state.left.answered && state.right.answered) {
                    resolveSkill();
                } else {
                    resultDiv.innerHTML = `✍️ ${role === 'left' ? '左徒' : '三闾大夫'} 已答，静待另一位落笔...`;
                }
            }

            // 结算技能
            function resolveSkill() {
                const left = state.left;
                const right = state.right;

                let firstCorrectRole = null;
                if (left.isCorrect && right.isCorrect) {
                    firstCorrectRole = left.timestamp <= right.timestamp ? 'left' : 'right';
                } else if (left.isCorrect && !right.isCorrect) {
                    firstCorrectRole = 'left';
                } else if (!left.isCorrect && right.isCorrect) {
                    firstCorrectRole = 'right';
                } else {
                    firstCorrectRole = null; // 都错
                }

                let resultMsg = '';

                if (firstCorrectRole) {
                    const firstName = firstCorrectRole === 'left' ? '左徒' : '三闾大夫';
                    resultMsg += `<span class="highlight">${firstName}</span> 先答对！展示所有手牌`;
                } else {
                    resultMsg += `❄️ 二人都未答对，无人展示手牌 ❄️`;
                }

                const leftWrong = left.answered && !left.isCorrect;
                const rightWrong = right.answered && !right.isCorrect;

                if (!firstCorrectRole) {
                    // 都错，两人都受罚
                    resultMsg += `<br>⚡ 左徒 与 三闾大夫 皆回答错误，受到 <span class="highlight">「无法响应 + 伤害翻倍」</span> 效果 ⚡`;
                } else {
                    const otherRole = firstCorrectRole === 'left' ? 'right' : 'left';
                    const otherName = otherRole === 'left' ? '左徒' : '三闾大夫';
                    if (!state[otherRole].isCorrect) {
                        resultMsg += `<br>💥 ${otherName} 回答错误，受到 <span class="highlight">「无法响应 + 伤害翻倍」</span> 惩罚 💥`;
                    } else {
                        resultMsg += `<br>🌸 ${otherName} 回答正确，未受惩罚。`;
                    }
                }

                resultDiv.innerHTML = `✦ 离骚结算 ✦<br>${resultMsg}`;
            }

            // 仅重置状态，不清除题目 (用于loadNewPair内部)
            function resetStateOnly() {
                state.left = { answered: false, answer: null, isCorrect: false, timestamp: null };
                state.right = { answered: false, answer: null, isCorrect: false, timestamp: null };

                leftStatus.innerHTML = '⚡ 等待回答 ⚡';
                rightStatus.innerHTML = '⚡ 等待回答 ⚡';
                resultDiv.innerHTML = '✦ 静待两位大夫落笔 ✦';

                // 重新显示按钮组（如果之前被隐藏）
                leftBtnsDiv.style.display = 'flex';
                rightBtnsDiv.style.display = 'flex';
            }

            // 重置全部（新题目 + 清空状态）
            function resetFull() {
                loadNewPair();
            }

            // 初始化
            function init() {
                loadNewPair();
            }

            resetBtn.addEventListener('click', resetFull);
            init();
        })();
    </script>
</body>
</html>
