<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曹婴 · 伏间</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(235, 225, 200, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 2px 2px 5px rgba(255, 250, 220, 0.6);
            padding: 30px 25px;
            border: 4px solid #cbae7a;
        }
        h1 {
            margin: 0 0 10px 0;
            font-weight: 600;
            font-size: 2.4rem;
            color: #35281a;
            text-shadow: 3px 3px 0 #dbb87c;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 1.2rem;
            color: #2d4f33;
            text-shadow: none;
            background: #efdebc;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid #a3875a;
            font-weight: 400;
        }
        .control-panel {
            background: #5f7e6b;
            padding: 22px 20px;
            border-radius: 50px;
            margin: 20px 0 30px 0;
            border: 3px solid #b99e6b;
            box-shadow: inset 0 0 0 2px #354f40, 0 8px 0 #2a412f;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px 25px;
        }
        .control-item {
            background: #eadbb9;
            border-radius: 40px;
            padding: 12px 22px;
            border: 2px solid #9c884d;
            box-shadow: inset 0 2px 5px #fff3cf, 0 5px 0 #6b5a38;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .control-item label {
            color: #2f422b;
            font-size: 1.2rem;
        }
        .control-item select, .control-item input {
            background: #fef9e7;
            border: 2px solid #7f693b;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e3a24;
            outline: none;
            cursor: pointer;
            box-shadow: inset 0 1px 4px #bcac82;
        }
        .btn {
            background: #e4c27d;
            border: none;
            border-radius: 50px;
            padding: 14px 32px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #2b442b;
            border-bottom: 6px solid #8f723a;
            border-right: 3px solid #846a35;
            transition: 0.07s ease;
            cursor: pointer;
            box-shadow: 0 7px 0 #6b522e, 0 4px 12px black;
            letter-spacing: 1px;
        }
        .btn:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 0 #6b522e;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0 20px;
        }
        /* 卡片统一最小高度，内容从顶部开始排列 */
        .player-card {
            background: #ebdbbd;
            border-radius: 30px;
            border: 4px solid #a98147;
            box-shadow: 0 10px 0 #6a4e26, inset 0 -3px 10px #ffeecc;
            padding: 20px 10px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            transition: border 0.2s, box-shadow 0.2s;
            position: relative;
        }
        /* 曹婴专属红色边框 */
        .player-card[data-caoying="true"] {
            border-color: #c53b2b;
            box-shadow: 0 10px 0 #832012, inset 0 0 20px #ffcf7c;
            background: #fbeec9;
        }
        /* 被观看的黄色边框 */
        .player-card.watched {
            border-color: #f5c542 !important;
            box-shadow: 0 10px 0 #b3872b, inset 0 0 20px #fff1b5, 0 0 15px gold;
        }
        .player-name {
            font-size: 2rem;
            font-weight: 800;
            color: #2a3c24;
            text-shadow: 2px 2px 0 #b59458;
            background: #aa8753;
            padding: 6px 20px;
            border-radius: 40px;
            border: 2px solid #e7c682;
            color: #251e0f;
            line-height: 1.2;
            margin-bottom: 15px;
        }
        .badge {
            background: #c0392b;
            color: #ffd98c;
            font-size: 1rem;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            border: 2px solid gold;
            letter-spacing: 1px;
            margin-top: 4px;
            width: fit-content;
        }
        .badge.watch-badge {
            background: #d4a017;
            color: #2d2d0a;
            border-color: #fff0a0;
            box-shadow: 0 2px 0 #8f6800;
        }
        footer {
            text-align: center;
            color: #d4c39a;
            margin-top: 15px;
            font-size: 1.2rem;
            text-shadow: 2px 2px 0 #2b4127;
        }

        /* ===== 手机适配：两列小卡片 ===== */
        @media screen and (max-width: 600px) {
            .game-container {
                padding: 12px 8px;
                border-radius: 32px 32px 24px 24px;
            }
            h1 {
                font-size: 1.3rem;
                justify-content: center;
                gap: 5px;
            }
            h1 small {
                font-size: 0.8rem;
                padding: 0.2rem 0.6rem;
            }

            /* 控制面板：并排 */
            .control-panel {
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                justify-content: center;
                padding: 10px 6px;
                gap: 6px;
                border-radius: 40px;
                margin: 10px 0 15px;
            }

            .control-item {
                flex: 1 1 calc(50% - 6px);
                min-width: 120px;
                flex-direction: column;
                padding: 8px 5px;
                gap: 4px;
                box-shadow: 0 3px 0 #6b5a38;
            }
            .control-item label {
                font-size: 0.8rem;
                white-space: nowrap;
            }
            .control-item select,
            .control-item input {
                width: 100%;
                font-size: 0.8rem;
                padding: 5px 8px;
            }

            .btn {
                width: 100%;
                padding: 8px 12px;
                font-size: 0.9rem;
                border-bottom-width: 3px;
                margin-top: 4px;
            }

            /* 玩家网格：两列布局 */
            .players-grid {
                grid-template-columns: repeat(2, 1fr);  /* 两列 */
                gap: 8px;
                margin: 12px 0 8px;
            }

            .player-card {
                width: auto;              /* 由grid分配宽度 */
                min-height: 60px;          /* 缩小高度 */
                padding: 6px 4px;
                border-radius: 16px;
                border-width: 3px;
                box-shadow: 0 3px 0 #6a4e26, inset 0 -2px 5px #ffeecc;
            }
            .player-card[data-caoying="true"] {
                box-shadow: 0 3px 0 #832012, inset 0 0 10px #ffcf7c;
            }
            .player-card.watched {
                box-shadow: 0 3px 0 #b3872b, inset 0 0 10px #fff1b5, 0 0 6px gold;
            }

            .player-name {
                font-size: 0.9rem;         /* 更小字体 */
                padding: 3px 8px;
                margin-bottom: 3px;
                border-width: 1.5px;
            }

            .badge {
                font-size: 0.55rem;        /* 徽章进一步缩小 */
                padding: 2px 6px;
                border-width: 1px;
                margin-top: 2px;
            }
            .badge.watch-badge {
                box-shadow: 0 2px 0 #8f6800;
            }

            footer {
                font-size: 0.7rem;
                margin-top: 6px;
            }
        }

        /* 超小屏（如 iPhone SE）再微调 */
        @media screen and (max-width: 400px) {
            .control-item {
                min-width: 100px;
                padding: 6px 4px;
            }
            .control-item label {
                font-size: 0.7rem;
            }
            .control-item select,
            .control-item input {
                font-size: 0.7rem;
                padding: 4px 6px;
            }
            .btn {
                padding: 6px 10px;
                font-size: 0.8rem;
            }
            .player-card {
                min-height: 50px;
            }
            .player-name {
                font-size: 0.8rem;
                padding: 2px 6px;
            }
            .badge {
                font-size: 0.5rem;
                padding: 2px 4px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>
         曹婴 · 伏间 
    </h1>

    <div class="control-panel">
        <div class="control-item">
            <label>🪑 座位数:</label>
            <input type="number" id="seatCount" min="2" max="8" value="4" step="1">
        </div>
        <div class="control-item">
            <label>👤 当前曹婴:</label>
            <select id="caoyingSelect"></select>
        </div>
        <button class="btn" id="activateFujianBtn">⚡ 发动【伏间】</button>
    </div>

    <!-- 玩家网格 -->
    <div id="playersGrid" class="players-grid"></div>

    <footer>—— 点击发动随机观看，黄色高亮持续5秒 ——</footer>
</div>

<script>
    (function() {
        const seatInput = document.getElementById('seatCount');
        const caoyingSelect = document.getElementById('caoyingSelect');
        const activateBtn = document.getElementById('activateFujianBtn');
        const playersGrid = document.getElementById('playersGrid');

        let players = [];
        let currentWatchedIndex = null;
        let watchTimer = null;

        function randomHandLength() {
            return Math.floor(Math.random() * 7);
        }

        function initPlayersHands(seatNum) {
            players = Array.from({ length: seatNum }, () => Array(randomHandLength()).fill({}));
        }

        function getMinHandCount() {
            if (players.length === 0) return 0;
            return Math.min(...players.map(p => p.length));
        }

        function clearWatchHighlight() {
            if (watchTimer) {
                clearTimeout(watchTimer);
                watchTimer = null;
            }
            if (currentWatchedIndex !== null) {
                const prevCard = document.querySelector(`.player-card[data-index="${currentWatchedIndex}"]`);
                if (prevCard) {
                    prevCard.classList.remove('watched');
                    const watchBadge = prevCard.querySelector('.watch-badge');
                    if (watchBadge) watchBadge.remove();
                }
                currentWatchedIndex = null;
            }
        }

        function renderPlayers() {
            playersGrid.innerHTML = '';
            const caoyingIdx = parseInt(caoyingSelect.value, 10);

            for (let i = 0; i < players.length; i++) {
                const isCaoying = (i === caoyingIdx);
                const card = document.createElement('div');
                card.className = 'player-card';
                card.setAttribute('data-index', i);
                if (isCaoying) card.setAttribute('data-caoying', 'true');

                const nameSpan = document.createElement('div');
                nameSpan.className = 'player-name';
                nameSpan.textContent = `P${i+1}`;
                card.appendChild(nameSpan);

                if (isCaoying) {
                    const badge = document.createElement('div');
                    badge.className = 'badge';
                    badge.textContent = '⭐ 曹婴';
                    card.appendChild(badge);
                }

                playersGrid.appendChild(card);
            }
            clearWatchHighlight();
        }

        function updateCaoyingSelect(seatNum) {
            const prevVal = caoyingSelect.value;
            caoyingSelect.innerHTML = '';
            for (let i = 0; i < seatNum; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = `玩家 ${i+1}`;
                caoyingSelect.appendChild(opt);
            }
            if (prevVal && parseInt(prevVal) < seatNum) {
                caoyingSelect.value = prevVal;
            } else {
                caoyingSelect.value = 0;
            }
        }

        function resetBySeat() {
            let seat = parseInt(seatInput.value, 10);
            seat = Math.min(8, Math.max(2, seat));
            seatInput.value = seat;

            initPlayersHands(seat);
            updateCaoyingSelect(seat);
            renderPlayers();
        }

        function activateFujian() {
            players = players.map(() => Array(randomHandLength()).fill({}));

            const caoyingIdx = parseInt(caoyingSelect.value, 10);
            const total = players.length;

            if (total < 2) return;

            const otherIndices = [];
            for (let i = 0; i < total; i++) {
                if (i !== caoyingIdx) otherIndices.push(i);
            }
            if (otherIndices.length === 0) return;

            const targetIdx = otherIndices[Math.floor(Math.random() * otherIndices.length)];

            clearWatchHighlight();

            const targetCard = document.querySelector(`.player-card[data-index="${targetIdx}"]`);
            if (!targetCard) return;

            targetCard.classList.add('watched');
            const watchBadge = document.createElement('div');
            watchBadge.className = 'badge watch-badge';
            watchBadge.textContent = '👀 观看';
            targetCard.appendChild(watchBadge);

            currentWatchedIndex = targetIdx;

            watchTimer = setTimeout(() => {
                if (currentWatchedIndex === targetIdx) {
                    targetCard.classList.remove('watched');
                    const badge = targetCard.querySelector('.watch-badge');
                    if (badge) badge.remove();
                    currentWatchedIndex = null;
                    watchTimer = null;
                }
            }, 5000);
        }

        seatInput.addEventListener('input', function(e) {
            let val = parseInt(e.target.value, 10);
            val = Math.min(8, Math.max(2, val));
            seatInput.value = val;
            resetBySeat();
        });

        caoyingSelect.addEventListener('change', function() {
            renderPlayers();
        });

        activateBtn.addEventListener('click', activateFujian);

        initPlayersHands(4);
        updateCaoyingSelect(4);
        renderPlayers();
    })();
</script>
</body>
</html>
