        }
        
        body {

            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }
        
        .suits-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .suit {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
        }
        
        .suit:hover {
            transform: scale(1.1);
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        
        .equipment-container {
            display: none;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .equipment-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .equipment {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .equipment:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }
        
        .skills-container {
            display: none;
            margin-bottom: 30px;
        }
        
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        
        .skill-option {
            width: 180px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .skill-option:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }
        
        .general-name {
            font-size: 12px;
            color: #ffcc00;
            margin-bottom: 5px;
        }
        
        .skill-name {
            font-size: 16px;
            font-weight: bold;
        }
        
        .action-buttons {
            display: none;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #ffcc00;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: #ffdd44;
            transform: scale(1.05);
        }
        
        .name-input-container {
            display: none;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .name-input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 200px;
            margin-right: 10px;
        }
        
        .submit-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
        
        .skills-display {
            margin-top: 30px;
        }
        
        .skills-display h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #ffcc00;
        }
        
        .my-skills, .other-skills {
            margin-bottom: 20px;
        }
        
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .acquired-skill {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            position: relative;
            transition: all 0.3s;
        }
        
        .acquired-skill:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .character-section {
            margin-bottom: 15px;
        }
        
        .character-name {
            font-size: 16px;
            color: #ffcc00;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .reset-btn {
            display: block;
            margin: 30px auto 0;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #f44336;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .reset-btn:hover {
            background: #ff6659;
            transform: scale(1.05);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-btn {
            padding: 8px 15px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .confirm-btn {
            background: #f44336;
            color: white;
        }
        
        .cancel-btn {
            background: #666;
            color: white;
        }
        
        .delete-confirm {
            display: none;
        }
        
        @media (max-width: 600px) {
            .suit {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }
            
            .skill-option {
                width: 150px;
            }
        }
    </style>
</head>

        <div class="suits-container">
            <div class="suit" data-suit="spade">♠️</div>
            <div class="suit" data-suit="heart">♥️</div>
            <div class="suit" data-suit="club">♣️</div>
            <div class="suit" data-suit="diamond">♦️</div>
        </div>
        
        <div class="equipment-container">
            <h2>选择装备</h2>
            <div class="equipment-list">
                <!-- 装备列表将在这里动态生成 -->
            </div>
        </div>
        
        <div class="skills-container">
            <h2>选择技能</h2>
            <div class="skills-list">
                <!-- 技能选项将在这里动态生成 -->
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" id="get-skill">获得此技能</button>
            <button class="action-btn" id="give-skill">将此技能交给其他角色</button>
        </div>
        
        <div class="name-input-container">
            <input type="text" class="name-input" placeholder="输入角色名">
            <button class="submit-btn">确认</button>
        </div>
        
        <div class="skills-display">
            <div class="my-skills">
                <h2>我的技能</h2>
                <div class="skills-grid" id="my-skills-grid">
                    <!-- 我的技能将在这里显示 -->
                </div>
            </div>
            
            <div class="other-skills">
                <h2>其他角色技能</h2>
                <div id="other-skills-grid">
                    <!-- 其他角色技能将在这里显示 -->
                </div>
            </div>
        </div>
        
        <button class="reset-btn">重置</button>
    </div>
    
    <div class="modal" id="duplicate-modal">
        <div class="modal-content">
            <h3>技能相同，无法选择</h3>

            <button class="modal-btn confirm-btn">确定</button>
        </div>
    </div>
    
    <div class="modal delete-confirm" id="delete-modal">
        <div class="modal-content">
            <h3>确认删除</h3>

            <button class="modal-btn confirm-btn" id="confirm-delete">确定</button>

    </div>

                        { general: "神诸葛亮", skill: "七星" },
                        { general: "神诸葛亮", skill: "狂风" },
                        { general: "卧龙诸葛", skill: "八阵" },
                        { general: "卧龙诸葛", skill: "看破" },
                        { general: "卧龙诸葛", skill: "火计" },
                        { general: "乐周瑜", skill: "顾音" },
                        { general: "乐周瑜", skill: "平虏" },
                        { general: "界周瑜", skill: "英姿" },
                        { general: "界周瑜", skill: "反间" },
                        { general: "神周瑜", skill: "琴音" },
                        { general: "神周瑜", skill: "业炎" },
                        { general: "谋周瑜", skill: "融火" },
                        { general: "谋周瑜", skill: "英谋" }
                    ]
                },
                { 
                    name: "紫骅", 
                    skillPool: [
                        { general: "界曹植", skill: "酒诗" },
                        { general: "界曹植", skill: "落英" }
                    ]
                },
                { 
                    name: "骅骝", 
                    skillPool: [
                        { general: "徐晃", skill: "断粮" },
                        { general: "徐晃", skill: "截辎" }
                    ]
                }
            ]
        };

        // 全局变量
        let currentSuit = null;
        let currentEquipment = null;
        let currentSkills = [];
        let selectedSkill = null;
        let mySkills = [];
        let otherSkills = {};
        let skillToDelete = null;
        let lastClickTime = 0;
        
        // DOM元素
        const suitsContainer = document.querySelector('.suits-container');
        const equipmentContainer = document.querySelector('.equipment-container');
        const equipmentList = document.querySelector('.equipment-list');
        const skillsContainer = document.querySelector('.skills-container');
        const skillsList = document.querySelector('.skills-list');
        const actionButtons = document.querySelector('.action-buttons');
        const nameInputContainer = document.querySelector('.name-input-container');
        const nameInput = document.querySelector('.name-input');
        const submitBtn = document.querySelector('.submit-btn');
        const mySkillsGrid = document.getElementById('my-skills-grid');
        const otherSkillsGrid = document.getElementById('other-skills-grid');
        const resetBtn = document.querySelector('.reset-btn');
        const duplicateModal = document.getElementById('duplicate-modal');
        const deleteModal = document.getElementById('delete-modal');
        const confirmDeleteBtn = document.getElementById('confirm-delete');
        const cancelDeleteBtn = document.getElementById('cancel-delete');
        
        // 事件监听
        document.querySelectorAll('.suit').forEach(suit => {
            suit.addEventListener('click', () => {
                currentSuit = suit.dataset.suit;
                showEquipment(currentSuit);
            });
        });
        
        document.getElementById('get-skill').addEventListener('click', () => {
            if (selectedSkill) {
                if (isDuplicateSkill(selectedSkill, 'my')) {
                    showDuplicateModal();
                } else {
                    addSkillToMySkills(selectedSkill);
                    resetToSuitSelection();
                }
            }
        });
        
        document.getElementById('give-skill').addEventListener('click', () => {
            actionButtons.style.display = 'none';
            nameInputContainer.style.display = 'block';
        });
        
        submitBtn.addEventListener('click', () => {
            const characterName = nameInput.value.trim();
            if (characterName && selectedSkill) {
                if (isDuplicateSkill(selectedSkill, characterName)) {
                    showDuplicateModal();
                } else {
                    addSkillToOtherSkills(selectedSkill, characterName);
                    resetToSuitSelection();
                }
            }
        });
        
        resetBtn.addEventListener('click', resetAll);
        
        document.querySelector('#duplicate-modal .confirm-btn').addEventListener('click', () => {
            duplicateModal.style.display = 'none';
        });
        
        confirmDeleteBtn.addEventListener('click', () => {
            if (skillToDelete) {
                deleteSkill(skillToDelete);
                skillToDelete = null;
            }
            deleteModal.style.display = 'none';
        });
        
        cancelDeleteBtn.addEventListener('click', () => {
            skillToDelete = null;
            deleteModal.style.display = 'none';
        });
        
        // 显示装备
        function showEquipment(suit) {
            equipmentContainer.style.display = 'block';
            equipmentList.innerHTML = '';
            
            equipmentData[suit].forEach(equipment => {
                const equipmentElement = document.createElement('div');
                equipmentElement.className = 'equipment';
                equipmentElement.textContent = equipment.name;
                equipmentElement.addEventListener('click', () => {
                    currentEquipment = equipment;
                    showSkills(equipment);
                });
                equipmentList.appendChild(equipmentElement);
            });
        }
        
        // 显示技能
        function showSkills(equipment) {
            skillsContainer.style.display = 'block';
            skillsList.innerHTML = '';
            
            // 从技能池中随机选择最多3个技能
            const shuffledSkills = [...equipment.skillPool].sort(() => 0.5 - Math.random());
            const selectedSkills = shuffledSkills.slice(0, 3);
            
            if (selectedSkills.length === 0) {
                const noSkillElement = document.createElement('div');
                noSkillElement.textContent = '该装备暂无可用技能';
                noSkillElement.style.textAlign = 'center';
                noSkillElement.style.width = '100%';
                skillsList.appendChild(noSkillElement);
                return;
            }
            
            selectedSkills.forEach(skillData => {
                const skillElement = document.createElement('div');
                skillElement.className = 'skill-option';
                skillElement.innerHTML = `
                    <div class="general-name">${skillData.general}</div>
                    <div class="skill-name">${skillData.skill}</div>
                `;
                skillElement.addEventListener('click', () => {
                    selectedSkill = {
                        general: skillData.general,
                        skill: skillData.skill,
                        equipment: equipment.name
                    };
                    actionButtons.style.display = 'flex';
                });
                skillsList.appendChild(skillElement);
            });
        }
        
        // 检查重复技能
        function isDuplicateSkill(skill, target) {
            if (target === 'my') {
                return mySkills.some(s => 
                    s.general === skill.general && s.skill === skill.skill
                );
            } else {
                if (!otherSkills[target]) return false;
                return otherSkills[target].some(s => 
                    s.general === skill.general && s.skill === skill.skill
                );
            }
        }
        
        // 添加到我的技能
        function addSkillToMySkills(skill) {
            mySkills.push(skill);
            updateSkillsDisplay();
        }
        
        // 添加到其他角色技能
        function addSkillToOtherSkills(skill, characterName) {
            if (!otherSkills[characterName]) {
                otherSkills[characterName] = [];
            }
            otherSkills[characterName].push(skill);
            updateSkillsDisplay();
        }
        
        // 更新技能显示
        function updateSkillsDisplay() {
            mySkillsGrid.innerHTML = '';
            otherSkillsGrid.innerHTML = '';
            
            // 显示我的技能
            mySkills.forEach((skill, index) => {
                const skillElement = createSkillElement(skill, 'my', index);
                mySkillsGrid.appendChild(skillElement);
            });
            
            // 显示其他角色技能
            Object.keys(otherSkills).forEach(characterName => {
                const characterSection = document.createElement('div');
                characterSection.className = 'character-section';
                
                const characterNameElement = document.createElement('div');
                characterNameElement.className = 'character-name';
                characterNameElement.textContent = characterName;
                characterSection.appendChild(characterNameElement);
                
                const skillsGrid = document.createElement('div');
                skillsGrid.className = 'skills-grid';
                
                otherSkills[characterName].forEach((skill, index) => {
                    const skillElement = createSkillElement(skill, characterName, index);
                    skillsGrid.appendChild(skillElement);
                });
                
                characterSection.appendChild(skillsGrid);
                otherSkillsGrid.appendChild(characterSection);
            });
        }
        
        // 创建技能元素
        function createSkillElement(skill, owner, index) {
            const skillElement = document.createElement('div');
            skillElement.className = 'acquired-skill';
            skillElement.innerHTML = `
                <div class="general-name">${skill.general}</div>
                <div class="skill-name">${skill.skill}</div>
            `;
            
            // 双击删除功能
            skillElement.addEventListener('click', () => {
                const currentTime = new Date().getTime();
                if (currentTime - lastClickTime < 500) { // 500ms内连续点击
                    skillToDelete = { owner, index };
                    deleteModal.style.display = 'flex';
                }
                lastClickTime = currentTime;
            });
            
            return skillElement;
        }
        
        // 删除技能
        function deleteSkill(skillInfo) {
            if (skillInfo.owner === 'my') {
                mySkills.splice(skillInfo.index, 1);
            } else {
                otherSkills[skillInfo.owner].splice(skillInfo.index, 1);
                if (otherSkills[skillInfo.owner].length === 0) {
                    delete otherSkills[skillInfo.owner];
                }
            }
            updateSkillsDisplay();
        }
        
        // 显示重复技能提示
        function showDuplicateModal() {
            duplicateModal.style.display = 'flex';
        }
        
        // 重置到花色选择
        function resetToSuitSelection() {
            equipmentContainer.style.display = 'none';
            skillsContainer.style.display = 'none';
            actionButtons.style.display = 'none';
            nameInputContainer.style.display = 'none';
            nameInput.value = '';
            selectedSkill = null;
        }
        
        // 重置所有
        function resetAll() {
            resetToSuitSelection();
            mySkills = [];
            otherSkills = {};
            updateSkillsDisplay();
        }
    </script>
</body>
</html>
