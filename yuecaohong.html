<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐曹洪摸金程序</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #1a2b3c;
            color: #e8d8b6;
            min-height: 100vh;
            padding: 20px;
            background-image: linear-gradient(to bottom, #1a2b3c, #0f1922);
            background-attachment: fixed;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #c9a96e;
        }
        
        h1 {
            color: #f2d374;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #c9a96e;
            font-size: 1.2rem;
        }
        
        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .options-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .option-card {
            background-color: #2c3e50;
            border-radius: 10px;
            padding: 20px;
            width: 100%;
            max-width: 300px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            border: 2px solid #3a506b;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }
        
        .option-card.active {
            border-color: #f2d374;
            box-shadow: 0 0 15px rgba(242, 211, 116, 0.5);
        }
        
        .option-card.locked {
            opacity: 0.6;
            filter: grayscale(0.5);
        }
        
        .option-number {
            position: absolute;
            top: -12px;
            left: -12px;
            background-color: #c9a96e;
            color: #1a2b3c;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .option-content {
            flex-grow: 1;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        .option-button {
            background-color: #c9a96e;
            color: #1a2b3c;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            align-self: flex-end;
            margin-top: auto;
        }
        
        .option-button:hover:not(:disabled) {
            background-color: #f2d374;
            transform: translateY(-2px);
        }
        
        .option-button:disabled {
            background-color: #5d6d7e;
            color: #a0a0a0;
            cursor: not-allowed;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background-color: #2c3e50;
            border-radius: 10px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid #c9a96e;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        
        .modal h2 {
            color: #f2d374;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.8rem;
        }
        
        .modal-content {
            font-size: 1.3rem;
            text-align: center;
            margin: 25px 0;
            padding: 20px;
            background-color: rgba(58, 80, 107, 0.3);
            border-radius: 8px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }
        
        .modal-result {
            color: #a3d9ff;
            font-weight: bold;
            font-size: 1.4rem;
        }
        
        .modal-effect {
            color: #ff9f9f;
            font-weight: bold;
            font-size: 1.4rem;
        }
        
        .modal-button {
            display: block;
            margin: 0 auto;
            background-color: #c9a96e;
            color: #1a2b3c;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .modal-button:hover {
            background-color: #f2d374;
            transform: translateY(-2px);
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            background-color: rgba(58, 80, 107, 0.5);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 1.1rem;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8rem;
            color: #f2d374;
            font-weight: bold;
        }
        
        .instructions {
            background-color: rgba(58, 80, 107, 0.5);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .instructions h3 {
            color: #c9a96e;
            margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            .options-container {
                flex-direction: column;
                align-items: center;
            }
            
            .option-card {
                max-width: 100%;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
        
        .gold-icon {
            color: #f2d374;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>乐曹洪摸金程序</h1>
            <div class="subtitle">选择一项任务完成，获取摸金奖励</div>
        </header>
        
        <div class="game-area">
            <div class="options-container" id="optionsContainer">
                <!-- 选项卡片将通过JavaScript动态生成 -->
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div>当前轮次</div>
                    <div class="stat-value" id="roundCount">1</div>
                </div>
                <div class="stat-item">
                    <div>已完成任务</div>
                    <div class="stat-value" id="completedCount">0</div>
                </div>
                <div class="stat-item">
                    <div>累计摸金</div>
                    <div class="stat-value" id="goldCount">0</div>
                </div>
            </div>
            
            <div class="instructions">
                <h3>游戏规则：</h3>
                <ol>
                    <li>每次随机显示三个不同的摸金任务，选择一个开始完成</li>
                    <li>选择任务后，其他任务将被锁定无法选择</li>
                    <li>点击"已完成"按钮后，将展示摸金结果</li>
                    <li>摸金结果：首先随机展示"装备"、"锦囊"或"基本"中的一项</li>
                    <li>如果结果不是"装备"，则额外随机展示"数值加一"或"不可响应"中的一项</li>
                    <li>确认结果后，将开启新一轮摸金任务</li>
                </ol>
            </div>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>摸金结果</h2>
            <div class="modal-content" id="modalContent">
                <!-- 弹窗内容将通过JavaScript动态生成 -->
            </div>
            <button class="modal-button" id="modalButton">确认</button>
        </div>
    </div>

    <script>
        // 摸金选项词条
        const optionTemplates = [
            "使用至少三张非基本牌",
            "本回合因弃置失去至少两张牌",
            "使用至少两张装备牌",
            "使用三张基本牌",
            "使用两张锦囊牌",
            "造成至少两点伤害",
            "令一名角色进入濒死状态",
            "造成1点属性伤害",
            "获得一名角色的至少一张牌",
            "本回合使用【酒】【杀】",
            "连续使用牌指定一名角色为目标",
            "本回合获得至少4张牌",
            "装备区内的牌全场最多（变化后）",
            "使用一张延时锦囊牌",
            "一名其他角色失去所有手牌"
        ];

        // 摸金结果选项
        const resultTypes = ["装备", "锦囊", "基本"];
        const effectTypes = ["数值加一", "不可响应"];
        
        // 游戏状态
        let gameState = {
            currentOptions: [],
            selectedOption: null,
            roundCount: 1,
            completedCount: 0,
            goldCount: 0,
            isModalOpen: false
        };
        
        // DOM元素
        const optionsContainer = document.getElementById('optionsContainer');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        const modalButton = document.getElementById('modalButton');
        const roundCountElement = document.getElementById('roundCount');
        const completedCountElement = document.getElementById('completedCount');
        const goldCountElement = document.getElementById('goldCount');
        
        // 初始化游戏
        function initGame() {
            generateOptions();
            renderOptions();
            updateStats();
            
            // 绑定弹窗按钮事件
            modalButton.addEventListener('click', closeModal);
        }
        
        // 生成随机选项（三个不重复）
        function generateOptions() {
            const availableOptions = [...optionTemplates];
            gameState.currentOptions = [];
            
            for (let i = 0; i < 3; i++) {
                if (availableOptions.length === 0) break;
                
                const randomIndex = Math.floor(Math.random() * availableOptions.length);
                const selectedOption = availableOptions.splice(randomIndex, 1)[0];
                gameState.currentOptions.push(selectedOption);
            }
        }
        
        // 渲染选项到界面
        function renderOptions() {
            optionsContainer.innerHTML = '';
            
            gameState.currentOptions.forEach((option, index) => {
                const optionCard = document.createElement('div');
                optionCard.className = 'option-card';
                optionCard.id = `option-${index}`;
                
                // 如果已经有选中的选项，则锁死其他选项
                if (gameState.selectedOption !== null && gameState.selectedOption !== index) {
                    optionCard.classList.add('locked');
                }
                
                optionCard.innerHTML = `
                    <div class="option-number">${index + 1}</div>
                    <div class="option-content">${option}</div>
                    <button class="option-button" ${gameState.selectedOption !== null && gameState.selectedOption !== index ? 'disabled' : ''}>
                        ${gameState.selectedOption === index ? '已完成' : '选择此任务'}
                    </button>
                `;
                
                // 绑定选项点击事件
                const optionButton = optionCard.querySelector('.option-button');
                optionButton.addEventListener('click', () => selectOption(index));
                
                optionsContainer.appendChild(optionCard);
            });
        }
        
        // 选择选项
        function selectOption(index) {
            // 如果已经选择了选项，则不再处理
            if (gameState.selectedOption !== null) return;
            
            gameState.selectedOption = index;
            
            // 高亮选中的选项
            const selectedCard = document.getElementById(`option-${index}`);
            selectedCard.classList.add('active');
            
            // 更新按钮文字
            const selectedButton = selectedCard.querySelector('.option-button');
            selectedButton.textContent = '已完成';
            
            // 锁死其他选项
            for (let i = 0; i < gameState.currentOptions.length; i++) {
                if (i !== index) {
                    const otherCard = document.getElementById(`option-${i}`);
                    otherCard.classList.add('locked');
                    
                    const otherButton = otherCard.querySelector('.option-button');
                    otherButton.disabled = true;
                }
            }
            
            // 为已完成按钮添加点击事件
            selectedButton.addEventListener('click', completeOption);
        }
        
        // 完成选项
        function completeOption() {
            // 更新统计
            gameState.completedCount++;
            
            // 生成随机摸金结果
            generateRandomResult();
            
            // 打开弹窗
            openModal();
            
            // 更新统计显示
            updateStats();
        }
        
        // 生成随机摸金结果
        function generateRandomResult() {
            // 随机选择结果类型
            const resultIndex = Math.floor(Math.random() * resultTypes.length);
            const result = resultTypes[resultIndex];
            
            // 构建弹窗内容
            let modalHTML = `<div class="modal-result">获得：${result}</div>`;
            
            // 如果结果不是"装备"，则随机添加一个效果
            if (result !== "装备") {
                const effectIndex = Math.floor(Math.random() * effectTypes.length);
                const effect = effectTypes[effectIndex];
                modalHTML += `<div class="modal-effect">效果：${effect}</div>`;
                
                // 如果获得效果，增加摸金计数
                gameState.goldCount++;
            }
            
            // 如果获得装备，也增加摸金计数
            if (result === "装备") {
                gameState.goldCount++;
            }
            
            modalContent.innerHTML = modalHTML;
        }
        
        // 打开弹窗
        function openModal() {
            modalOverlay.classList.add('active');
            gameState.isModalOpen = true;
        }
        
        // 关闭弹窗
        function closeModal() {
            modalOverlay.classList.remove('active');
            gameState.isModalOpen = false;
            
            // 开始新一轮
            startNewRound();
        }
        
        // 开始新一轮
        function startNewRound() {
            // 重置选择状态
            gameState.selectedOption = null;
            
            // 增加轮次计数
            gameState.roundCount++;
            
            // 生成新选项
            generateOptions();
            renderOptions();
            
            // 更新统计显示
            updateStats();
        }
        
        // 更新统计显示
        function updateStats() {
            roundCountElement.textContent = gameState.roundCount;
            completedCountElement.textContent = gameState.completedCount;
            goldCountElement.textContent = gameState.goldCount;
        }
        
        // 初始化游戏
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
