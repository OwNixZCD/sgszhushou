<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>蒲元 · 铸刃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a3a2a 0%, #0e2418 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            padding: 12px;
            margin: 0;
        }

        .main {
            width: 100%;
            max-width: 560px;  /* 手机舒适宽度，大屏手机也不会太宽 */
            background: rgba(28, 28, 18, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid #cfb271;
            padding: 20px 16px 28px;
            transition: all 0.2s;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 4px;
            background: linear-gradient(135deg, #f7e5a6, #d8aa4b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .sub {
            text-align: center;
            color: #ecd897;
            border-bottom: 1px solid #c2a257;
            display: inline-block;
            width: 100%;
            padding-bottom: 8px;
            margin-bottom: 24px;
            font-style: italic;
            font-size: 0.8rem;
        }

        /* 点数网格 - 移动优先：每行自动适配，最少3列，最多5列 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 14px 10px;
            margin-bottom: 28px;
        }

        /* 卡片 - 增大触摸区域，移动端友好 */
        .point-card {
            background: #2b241ae0;
            border-radius: 32px;
            text-align: center;
            padding: 14px 6px;
            cursor: pointer;
            border: 1px solid #e6bf78;
            box-shadow: 0 5px 0 #4e3a1f;
            transition: 0.05s linear;
            backdrop-filter: blur(2px);
            /* 确保最小点击区域 */
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .point-card:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #4e3a1f;
        }

        .rank-number {
            font-size: 2rem;
            font-weight: 800;
            color: #ffefb9;
            text-shadow: 2px 2px 0 #4f3216;
            letter-spacing: 1px;
        }

        /* 结果面板 */
        .result-panel {
            background: #0b1a0fe0;
            border-radius: 40px;
            padding: 14px 16px;
            text-align: center;
            border: 1px solid #eac477;
            margin-top: 8px;
        }

        .result-text {
            font-size: 1.25rem;
            font-weight: bold;
            padding: 12px 12px;
            border-radius: 48px;
            display: inline-block;
            background: #1f271bc9;
            color: #ffefb9;
            backdrop-filter: blur(4px);
            min-width: 200px;
            font-family: monospace;
            letter-spacing: 1px;
            transition: 0.1s;
            line-height: 1.4;
            word-break: break-word;
        }

        .success {
            color: #b9ffb9;
            text-shadow: 0 0 5px #149414;
            border-left: 4px solid #66ff66;
            border-right: 4px solid #66ff66;
        }

        .fail {
            color: #ffb8a8;
            text-shadow: 0 0 3px #ab4a34;
            border-left: 4px solid #ff8866;
            border-right: 4px solid #ff8866;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 24px;
        }

        .btn {
            background: #daa451;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 3px 0 #7a531f;
            color: #2c2418;
            font-family: inherit;
            flex: 0 1 auto;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a531f;
        }

        .note {
            text-align: center;
            font-size: 0.65rem;
            color: #c6b175;
            margin-top: 20px;
            padding: 0 6px;
        }

        /* 超小屏 (宽度 < 400px) 进一步优化卡片 */
        @media (max-width: 450px) {
            .main {
                padding: 16px 12px 24px;
            }
            .grid {
                gap: 12px 8px;
                grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
            }
            .point-card {
                padding: 10px 4px;
                min-height: 62px;
            }
            .rank-number {
                font-size: 1.7rem;
            }
            .result-text {
                font-size: 1rem;
                padding: 10px 8px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }

        /* 小折叠或较宽手机（超过500px 保持舒适） */
        @media (min-width: 500px) and (max-width: 650px) {
            .grid {
                gap: 16px 12px;
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
            .rank-number {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
<div class="main">
    <h1>⚙️ 蒲元 · 铸刃 ⚙️</h1>
    <div class="sub"></div>

    <!-- 13个点数按钮，对应 1~13 点 (显示为 A,2~10,J,Q,K) -->
    <div class="grid" id="pointsContainer"></div>

    <div class="result-panel">
        <div class="result-text" id="resultDisplay">⚡ 点击点数 ⚡</div>
    </div>

    <div class="btn-group">
        <button class="btn" id="resetMsgBtn">🗑️ 清空结果</button>
    </div>
    <div class="note">
        💡  轻点即可铸刃
    </div>
</div>

<script>
    // ============================================================
    // ********** 成功率配置区 (只在此处修改) **********
    // 1~13点分别对应成功概率 (0~100整数)
    // 默认经典设定: 1~4点 85%, 5~8点 90%, 9~12点 95%, 13点(K) 100%
    // 您可以直接修改下面 successRateByPoint 对象的值
    // ------------------------------------------------------------
    const successRateByPoint = {
        1: 85,    // A点
        2: 85,
        3: 85,
        4: 85,
        5: 90,
        6: 90,
        7: 90,
        8: 90,
        9: 95,
        10: 95,
        11: 95,   // J点
        12: 95,   // Q点
        13: 100   // K点
    };
    // 请确保数值范围 0~100，整数或浮点数均可
    // ============================================================

    // 辅助: 将数字点数转为显示字符 (1->A, 11->J, 12->Q, 13->K)
    function getRankSymbol(rank) {
        if (rank === 1) return "A";
        if (rank === 11) return "J";
        if (rank === 12) return "Q";
        if (rank === 13) return "K";
        return rank.toString();
    }

    // 获取成功率 (带边界保护)
    function getSuccessRate(rank) {
        let rate = successRateByPoint[rank];
        if (rate === undefined) rate = 50;
        return Math.min(100, Math.max(0, Number(rate)));
    }

    // 铸刃判定核心
    function castForge(rank) {
        const rate = getSuccessRate(rank);
        const random = Math.random() * 100;
        const isSuccess = random < rate;
        const rankShow = getRankSymbol(rank);
        const pointDesc = `${rankShow} (${rank}点)`;

        const resultDiv = document.getElementById("resultDisplay");
        if (isSuccess) {
            resultDiv.innerHTML = `✨ 铸刃成功！ ✨<br> 点数 ${rankShow} | 获得神兵！`;
            resultDiv.classList.add("success");
            resultDiv.classList.remove("fail");
        } else {
            resultDiv.innerHTML = `💔 铸刃失败！ 💔<br> 点数 ${rankShow} | 只得一张【杀】。`;
            resultDiv.classList.add("fail");
            resultDiv.classList.remove("success");
        }
        // 轻触反馈: 背景闪烁
        const panel = document.querySelector(".main");
        if (panel) {
            panel.style.transition = "0.08s background";
            panel.style.backgroundColor = isSuccess ? "#2b5d3baa" : "#792f2faa";
            setTimeout(() => {
                panel.style.backgroundColor = "";
            }, 150);
        }
    }

    // 清空结果区域
    function clearResult() {
        const resultDiv = document.getElementById("resultDisplay");
        resultDiv.innerHTML = "⚡ 点击点数 ⚡";
        resultDiv.classList.remove("success", "fail");
    }

    // 生成13个点数卡片 (1~13)
    function buildPointsGrid() {
        const container = document.getElementById("pointsContainer");
        if (!container) return;
        container.innerHTML = "";
        for (let rank = 1; rank <= 13; rank++) {
            const symbol = getRankSymbol(rank);
            const card = document.createElement("div");
            card.className = "point-card";

            const rankSpan = document.createElement("div");
            rankSpan.className = "rank-number";
            rankSpan.innerText = symbol;
            card.appendChild(rankSpan);

            // 绑定点击事件
            card.addEventListener("click", (e) => {
                e.stopPropagation();
                castForge(rank);
            });
            container.appendChild(card);
        }
    }

    // 绑定按钮事件
    function bindControls() {
        const clearBtn = document.getElementById("resetMsgBtn");
        if (clearBtn) {
            clearBtn.addEventListener("click", clearResult);
        }
    }

    // 初始化
    function init() {
        buildPointsGrid();
        bindControls();
        clearResult();
    }

    init();
</script>
</body>
</html>
